<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero 案C — Architectural Split | B-GRAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #7DB5C8;
      --dark:   #1A1F2E;
      --light:  #F2F0EC;
      --ease:   cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    html, body { height: 100%; }
    body { font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }

    /* ── NAV (透明×左右両対応) ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; height: 80px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 3rem; z-index: 100;
    }
    .nav-logo { display: flex; align-items: center; }
    .nav-logo img { height: 30px; width: auto; }
    .nav-links { display: flex; gap: 2.5rem; align-items: center; }
    .nav-links a {
      font-size: 0.72rem; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.55); text-decoration: none;
      transition: color 0.25s;
    }
    .nav-links a:hover { color: #fff; }
    .nav-contact-btn {
      border: 1px solid rgba(255,255,255,0.25) !important;
      color: rgba(255,255,255,0.7) !important;
      padding: 0.45rem 1.4rem;
      transition: all 0.25s !important;
    }
    .nav-contact-btn:hover {
      background: rgba(255,255,255,0.08) !important;
      border-color: rgba(255,255,255,0.5) !important;
      color: #fff !important;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 42% 58%;
      position: relative;
      overflow: hidden;
    }

    /* 左パネル — オフホワイト */
    .hero-left {
      background: var(--light);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 120px 5vw 80px 6vw;
      position: relative;
      z-index: 2;
    }

    /* 左のロゴ & 装飾 */
    .hero-logo-area {
      margin-bottom: 4rem;
      opacity: 0;
      animation: fadeUp 1.2s var(--ease) 0.2s forwards;
    }
    .hero-logo-area img {
      height: 52px; width: auto;
      /* ロゴが白の場合は不要。黒地のロゴ推奨 */
    }
    .hero-logo-fallback {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 300; letter-spacing: 0.45em;
      color: #1A1A1A; text-indent: 0.45em;
    }

    .hero-logo-caption {
      margin-top: 0.75rem;
      font-size: 0.68rem; letter-spacing: 0.4em;
      color: rgba(26,26,26,0.35);
      text-transform: uppercase;
    }

    /* 左の細い区切り */
    .hero-left-rule {
      width: 40px; height: 1px;
      background: var(--blue);
      margin-bottom: 1.75rem;
      opacity: 0;
      animation: expandW 1.2s var(--ease) 0.6s forwards;
    }
    @keyframes expandW {
      from { opacity:0; width:0; }
      to   { opacity:1; width:40px; }
    }

    .hero-left-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem; letter-spacing: 0.4em;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeUp 1s var(--ease) 0.8s forwards;
    }

    .hero-left-text {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1rem, 1.5vw, 1.2rem);
      font-weight: 300;
      color: rgba(26,26,26,0.55);
      line-height: 2;
      letter-spacing: 0.04em;
      max-width: 280px;
      opacity: 0;
      animation: fadeUp 1s var(--ease) 1s forwards;
    }

    /* 左の縦テキスト */
    .hero-left-vertical {
      position: absolute;
      left: 2rem; bottom: 4rem;
      writing-mode: vertical-rl;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem; letter-spacing: 0.35em;
      color: rgba(26,26,26,0.2);
      opacity: 0;
      animation: fadeIn 1.5s ease 1.5s forwards;
    }

    /* 右パネル — ダークネイビー */
    .hero-right {
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 120px 6vw 80px 5vw;
      position: relative;
      overflow: hidden;
    }

    /* 右パネルの背景装飾 */
    .hero-right::before {
      content: '';
      position: absolute;
      top: -20%; right: -20%;
      width: 60%; padding-bottom: 60%;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(125,181,200,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    /* 右パネルの細かいドット/線グリッド */
    .hero-right::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(125,181,200,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(125,181,200,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-right-inner {
      position: relative; z-index: 2;
      max-width: 500px;
    }

    .hero-right-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem; letter-spacing: 0.5em;
      color: rgba(125,181,200,0.6);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      display: flex; align-items: center; gap: 1rem;
      opacity: 0;
      animation: fadeUp 1s var(--ease) 0.4s forwards;
    }
    .hero-right-label::before {
      content: '';
      width: 30px; height: 1px;
      background: rgba(125,181,200,0.5);
      flex-shrink: 0;
    }

    .hero-headline {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1.9rem, 3.2vw, 3rem);
      font-weight: 200;
      color: #fff;
      line-height: 1.8;
      letter-spacing: 0.06em;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s var(--ease) 0.6s forwards;
    }

    .hero-cta {
      display: flex; gap: 1rem; flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 1s var(--ease) 0.9s forwards;
    }
    .btn {
      padding: 0.85rem 2.4rem;
      font-size: 0.77rem; letter-spacing: 0.15em;
      font-family: 'Noto Sans JP', sans-serif;
      text-decoration: none; transition: all 0.3s;
      display: inline-block;
    }
    .btn-primary {
      background: var(--blue); color: #fff;
    }
    .btn-primary:hover {
      background: #5A9AB4;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(125,181,200,0.3);
    }
    .btn-outline {
      background: transparent; color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn-outline:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.45);
    }

    /* 右の数値装飾 */
    .hero-right-nums {
      position: absolute;
      right: 3vw; bottom: 5rem;
      display: flex; flex-direction: column; gap: 1.5rem;
      z-index: 2;
      opacity: 0;
      animation: fadeIn 1.5s ease 1.2s forwards;
    }
    .hero-stat {
      text-align: right;
    }
    .hero-stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 300;
      color: rgba(125,181,200,0.5);
      line-height: 1;
    }
    .hero-stat-label {
      font-size: 0.62rem; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      margin-top: 0.2rem;
    }

    /* スクロール */
    .hero-scroll {
      position: absolute; bottom: 2.5rem;
      left: calc(42% / 2);
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
    }
    .hero-scroll span {
      font-size: 0.58rem; letter-spacing: 0.4em;
      color: rgba(26,26,26,0.3);
    }
    .scroll-line {
      width: 1px; height: 50px;
      background: linear-gradient(to bottom, rgba(125,181,200,0.5), transparent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* デモ注記 */
    .demo-badge {
      position: fixed; top: 1rem; right: 1rem;
      background: var(--blue); color: #fff;
      padding: 0.3rem 0.8rem; font-size: 0.7rem;
      letter-spacing: 0.1em; z-index: 999;
    }

    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .hero-left { min-height: 50vh; padding: 100px 2rem 3rem; }
      .hero-right { min-height: 60vh; padding: 3rem 2rem 5rem; }
      .hero-right-nums { display: none; }
      .hero-scroll { left: 50%; }
    }
  </style>
</head>
<body>

<div class="demo-badge">案C — Architectural Split</div>

<nav>
  <a href="#" class="nav-logo" aria-label="B-GRAM">
    <img src="assets/logo-white.png" alt="B-GRAM"
         onerror="this.src='assets/logo.png'; this.style.filter='brightness(0) invert(1)'">
  </a>
  <div class="nav-links">
    <a href="#">VISION</a>
    <a href="#">事業内容</a>
    <a href="#">会社概要</a>
    <a href="#">アクセス</a>
    <a href="#" class="nav-contact-btn">お問い合わせ</a>
  </div>
</nav>

<section class="hero">

  <!-- 左パネル：ロゴ + サブ情報 -->
  <div class="hero-left">

    <div class="hero-logo-area">
      <img src="assets/logo.png" alt="B-GRAM"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
      <span class="hero-logo-fallback" style="display:none;">B-GRAM</span>
      <p class="hero-logo-caption">ビーグラム株式会社</p>
    </div>

    <div class="hero-left-rule"></div>

    <p class="hero-left-label">Real Estate · Osaka</p>

    <p class="hero-left-text">
      大阪を拠点とする<br>
      不動産コンサルティング<br>
      カンパニー
    </p>

    <p class="hero-left-vertical">B-GRAM CO., LTD. OSAKA, JAPAN</p>

  </div>

  <!-- 右パネル：キャッチコピー -->
  <div class="hero-right">
    <div class="hero-right-inner">

      <p class="hero-right-label">Our Mission</p>

      <h1 class="hero-headline">
        唯一無二の<br>
        不動産を最大化へ<br>
        導くパートナー
      </h1>

      <div class="hero-cta">
        <a href="#" class="btn btn-primary">事業内容を見る</a>
        <a href="#" class="btn btn-outline">会社概要</a>
      </div>

    </div>

    <!-- 数値装飾 -->
    <div class="hero-right-nums">
      <div class="hero-stat">
        <p class="hero-stat-num">大阪</p>
        <p class="hero-stat-label">本社所在地</p>
      </div>
      <div class="hero-stat">
        <p class="hero-stat-num">No.65425</p>
        <p class="hero-stat-label">大阪府知事免許</p>
      </div>
    </div>

  </div>

  <div class="hero-scroll">
    <span>SCROLL</span>
    <div class="scroll-line"></div>
  </div>

</section>

</body>
</html>
