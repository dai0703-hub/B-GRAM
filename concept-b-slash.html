<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案B — SLASH | B-GRAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080808; }
    :root {
      --red: #E63946;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ═══════════════════════════════════════
       OPENING
    ═══════════════════════════════════════ */
    #opening {
      position: fixed; inset: 0; z-index: 9000;
      background: #080808;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Diagonal slash lines */
    .slash-line {
      position: absolute;
      width: 2px;
      height: 200vh;
      background: rgba(255,255,255,0.07);
      top: 50%; left: 50%;
      transform-origin: center;
      transform: translate(-50%,-50%) rotate(-20deg) scaleY(0);
    }
    .slash-line:nth-child(1) {
      background: rgba(255,255,255,0.1);
      transform: translate(calc(-50% - 12vw),-50%) rotate(-20deg) scaleY(0);
      animation: slashIn 0.6s var(--ease) 0.3s forwards;
    }
    .slash-line:nth-child(2) {
      background: rgba(230,57,70,0.6);
      width: 1px;
      transform: translate(-50%,-50%) rotate(-20deg) scaleY(0);
      animation: slashIn 0.6s var(--ease) 0.6s forwards;
    }
    .slash-line:nth-child(3) {
      background: rgba(255,255,255,0.07);
      transform: translate(calc(-50% + 12vw),-50%) rotate(-20deg) scaleY(0);
      animation: slashIn 0.6s var(--ease) 0.9s forwards;
    }
    @keyframes slashIn {
      from { transform: translate(var(--tx, -50%),-50%) rotate(-20deg) scaleY(0); }
      to   { transform: translate(var(--tx, -50%),-50%) rotate(-20deg) scaleY(1); }
    }

    /* Override transform for positional slashes */
    .slash-line:nth-child(1) { --tx: calc(-50% - 12vw); }
    .slash-line:nth-child(3) { --tx: calc(-50% + 12vw); }

    /* Logo block */
    .op-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: flex-start;
      gap: 1.5rem;
      clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%);
      animation: slashReveal 0.8s var(--ease) 1.0s forwards;
    }
    @keyframes slashReveal {
      from { clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%); }
      to   { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    }

    .op-logo img {
      height: 48px; width: auto;
      filter: brightness(0) invert(1);
    }

    .op-name {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .op-name span {
      color: var(--red);
    }

    .op-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    /* Opening exit: diagonal wipe */
    #opening.exit {
      animation: slashExit 0.8s cubic-bezier(0.76, 0, 0.24, 1) 0.1s forwards;
    }
    @keyframes slashExit {
      0%   { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
      100% { clip-path: polygon(120% 0, 120% 0, 100% 100%, 100% 100%); }
    }

    /* ═══════════════════════════════════════
       HERO
    ═══════════════════════════════════════ */
    #hero {
      position: relative; width: 100%; height: 100vh; overflow: hidden;
      background: #080808;
    }

    .hero-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: videoIn 1.5s ease 0.2s forwards;
    }
    @keyframes videoIn {
      from { opacity: 0; transform: scale(1.05); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Diagonal dark overlay – covers left portion */
    .hero-overlay-main {
      position: absolute; inset: 0;
      background: linear-gradient(
        108deg,
        rgba(8,8,8,0.96) 0%,
        rgba(8,8,8,0.88) 45%,
        rgba(8,8,8,0.3) 70%,
        rgba(8,8,8,0.55) 100%
      );
    }
    .hero-overlay-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
      background: linear-gradient(to top, rgba(8,8,8,0.98), transparent);
    }

    /* Diagonal accent line */
    .hero-slash {
      position: absolute;
      top: 0; right: 38vw;
      width: 1px; height: 100%;
      background: linear-gradient(to bottom, transparent 0%, var(--red) 30%, var(--red) 70%, transparent 100%);
      transform: rotate(-8deg) translateX(0);
      opacity: 0;
      animation: heroSlashIn 1s ease 0.6s forwards;
    }
    @keyframes heroSlashIn {
      from { opacity: 0; transform: rotate(-8deg) scaleY(0); }
      to   { opacity: 0.5; transform: rotate(-8deg) scaleY(1); }
    }

    /* Content */
    .hero-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 8vw;
      padding-bottom: 5rem;
    }

    .hero-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.68rem;
      letter-spacing: 0.6em;
      color: var(--red);
      text-transform: uppercase;
      display: flex; align-items: center; gap: 0.8rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: itemIn 0.7s var(--ease) 0.8s forwards;
    }
    .hero-eyebrow::before {
      content: '/'; color: var(--red); font-size: 1.1rem; font-weight: 300;
    }

    .hero-h1 {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: clamp(2.8rem, 6vw, 6.5rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: itemIn 0.7s var(--ease) 1.0s forwards;
      max-width: 55vw;
    }
    .hero-h1-sub {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(1.1rem, 2vw, 1.8rem);
      font-weight: 200;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: itemIn 0.7s var(--ease) 1.2s forwards;
    }

    /* CTA */
    .hero-cta {
      display: flex; gap: 1.2rem; align-items: center;
      opacity: 0;
      animation: itemIn 0.7s var(--ease) 1.5s forwards;
    }
    .btn-slash {
      position: relative;
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.1em;
      color: #fff;
      text-decoration: none;
      padding: 1rem 2.4rem;
      background: var(--red);
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 100%, 14px 100%);
      transition: background 0.25s, transform 0.25s;
    }
    .btn-slash:hover {
      background: #c62a37;
      transform: translateY(-2px);
    }
    .btn-ghost {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.82rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 0.2rem;
      transition: color 0.25s, border-color 0.25s;
    }
    .btn-ghost:hover {
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.4);
    }

    /* Bottom info strip */
    .hero-strip {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center;
      padding: 1.2rem 8vw;
      border-top: 1px solid rgba(255,255,255,0.06);
      gap: 3rem;
      opacity: 0;
      animation: itemIn 0.7s ease 2.0s forwards;
    }
    .strip-item {
      display: flex; flex-direction: column; gap: 0.2rem;
    }
    .strip-label {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.2);
      font-family: 'Cormorant Garamond', serif;
      text-transform: uppercase;
    }
    .strip-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.88rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.55);
    }
    .strip-sep {
      width: 1px; height: 28px;
      background: rgba(255,255,255,0.1);
    }

    /* Scroll indicator */
    .hero-scroll {
      position: absolute; right: 3rem; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      opacity: 0;
      animation: itemIn 0.7s ease 2.2s forwards;
    }
    .hero-scroll span {
      font-size: 0.52rem; letter-spacing: 0.5em;
      color: rgba(255,255,255,0.2);
      writing-mode: vertical-rl;
    }
    .scroll-bar {
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, var(--red), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    @keyframes itemIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Demo badge */
    .badge {
      position: fixed; top: 1.2rem; right: 1.2rem;
      background: var(--red); color: #fff;
      padding: 0.3rem 0.9rem;
      font-size: 0.65rem; letter-spacing: 0.15em;
      z-index: 8999; font-family: 'Cormorant Garamond', serif;
    }
  </style>
</head>
<body>

<div class="badge">案B — SLASH</div>

<!-- ── OPENING ── -->
<div id="opening">
  <div class="slash-line"></div>
  <div class="slash-line"></div>
  <div class="slash-line"></div>

  <div class="op-content">
    <div class="op-logo">
      <img src="assets/logo_m.svg" alt="B-GRAM">
    </div>
    <div class="op-name">B<span>-</span>GRAM</div>
    <p class="op-sub">Real Estate &nbsp;/&nbsp; Osaka &nbsp;/&nbsp; Japan</p>
  </div>
</div>

<!-- ── HERO ── -->
<section id="hero">
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="assets/bg-hero.mov" type="video/mp4">
    <source src="assets/bg-hero.mov" type="video/quicktime">
  </video>

  <div class="hero-overlay-main"></div>
  <div class="hero-overlay-bottom"></div>
  <div class="hero-slash"></div>

  <div class="hero-content">
    <p class="hero-eyebrow">Property &nbsp; Innovation &nbsp; Osaka</p>
    <h1 class="hero-h1">唯一無二の<br>不動産を<br>最大化へ。</h1>
    <p class="hero-h1-sub">二極化の時代を、ともに切り拓く</p>
    <div class="hero-cta">
      <a href="#" class="btn-slash">事業内容を見る</a>
      <a href="#" class="btn-ghost">COMPANY →</a>
    </div>
  </div>

  <div class="hero-strip">
    <div class="strip-item">
      <span class="strip-label">Location</span>
      <span class="strip-value">Osaka, Japan</span>
    </div>
    <div class="strip-sep"></div>
    <div class="strip-item">
      <span class="strip-label">Industry</span>
      <span class="strip-value">Real Estate</span>
    </div>
    <div class="strip-sep"></div>
    <div class="strip-item">
      <span class="strip-label">Concept</span>
      <span class="strip-value">Maximize Uniqueness</span>
    </div>
  </div>

  <div class="hero-scroll">
    <div class="scroll-bar"></div>
    <span>SCROLL</span>
  </div>
</section>

<script>
  window.addEventListener('load', () => {
    const opening = document.getElementById('opening');
    setTimeout(() => {
      opening.classList.add('exit');
      setTimeout(() => { opening.style.display = 'none'; }, 900);
    }, 3000);
  });
</script>
</body>
</html>
